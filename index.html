<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Layout Prototypes — Slack · Notion · Linear · flex</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Pretendard Variable", Pretendard, -apple-system, "Inter", "Segoe UI", sans-serif; }
  body {
    display: grid;
    grid-template-rows: 1fr 40px;
    grid-template-columns: minmax(0, 1fr);
    background: #111;
  }
  .tabs { min-width: 0; overflow-x: auto; }
  .tabs::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    align-items: stretch;
    background: #111;
    border-top: 1px solid #2a2a2a;
    padding-left: 12px;
    gap: 2px;
  }
  .tabs button {
    border: 0;
    background: transparent;
    color: #8a8a8a;
    font-family: "Pretendard Variable", Pretendard, -apple-system, "Inter", "Segoe UI", sans-serif;
    font-size: 12px;
    padding: 0 18px;
    cursor: pointer;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: color 120ms, border-color 120ms;
  }
  .tabs button:hover { color: #ccc; }
  .tabs button.active {
    color: #fff;
    border-bottom-color: #2383e2;
  }
  .tabs .spacer { flex: 1; }
  .tabs .label {
    font-size: 10px;
    color: #555;
    align-self: center;
    padding-right: 12px;
    font-family: "Pretendard Variable", Pretendard, -apple-system, "Inter", "Segoe UI", sans-serif;
  }

  /* flex 컨트롤 — flex 탭 활성화 시에만 노출 */
  .flex-controls {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
  }
  body.flex-active .flex-controls { display: inline-flex; }
  .flex-controls button {
    border: 0;
    background: transparent;
    color: #8a8a8a;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: "Pretendard Variable", Pretendard, -apple-system, "Inter", "Segoe UI", sans-serif;
    border-radius: 4px;
    border-bottom: 0;
    font-weight: 500;
  }
  .flex-controls button:hover { color: #ccc; background: rgba(255,255,255,.04); }
  .flex-controls button.active { background: #2383e2; color: #fff; }

  /* 세그먼티드 컨트롤 (PageHeader 타입) */
  .flex-controls .segmented {
    display: inline-flex;
    gap: 0;
    background: rgba(255,255,255,.06);
    border-radius: 5px;
    padding: 2px;
  }
  .flex-controls .segmented button {
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 10px;
  }
  .flex-controls .segmented button.active {
    background: #2383e2;
    color: #fff;
  }
  /* startAside off → 타입 선택 비활성 */
  .flex-controls .segmented.disabled {
    opacity: .35;
    pointer-events: none;
  }

  .frame-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
  }
  iframe {
    border: 0;
    width: 100%;
    height: 100%;
    display: none;
    background: #fff;
  }
  iframe.active { display: block; }
</style>
</head>
<body>

<div class="frame-wrap">
  <iframe id="frame-flex"   class="active" src="flex-layout-prototype.html"></iframe>
  <iframe id="frame-slack"              src="slack-layout-prototype.html"></iframe>
  <iframe id="frame-notion"             src="notion-layout-prototype.html"></iframe>
  <iframe id="frame-linear"             src="linear-layout-prototype.html"></iframe>
</div>

<nav class="tabs">
  <button class="tab-btn active" data-target="flex">flex</button>
  <button class="tab-btn" data-target="slack">Slack</button>
  <button class="tab-btn" data-target="notion">Notion</button>
  <button class="tab-btn" data-target="linear">Linear</button>
  <span class="spacer"></span>
  <span class="flex-controls" id="flex-controls">
    <button data-fx="startaside" class="active">startAside</button>
    <span class="segmented" id="seg-startaside">
      <button data-fx="header-lnb" class="active">사이드바</button>
      <button data-fx="header-start">패널</button>
    </span>
    <button data-fx="end" class="active">endPanel</button>
    <button data-fx="sheet">Sheet</button>
  </span>
  <span id="dims" class="label">L:— · E:— · M:—</span>
  <span class="label">layout prototype</span>
</nav>

<script>
  const buttons = document.querySelectorAll('.tab-btn');
  const frames = {
    slack: document.getElementById('frame-slack'),
    notion: document.getElementById('frame-notion'),
    linear: document.getElementById('frame-linear'),
    flex: document.getElementById('frame-flex'),
  };
  const TAB_KEY = 'fx_selected_tab';
  const setActiveTab = (target) => {
    buttons.forEach(b => b.classList.toggle('active', b.dataset.target === target));
    Object.entries(frames).forEach(([k, el]) => el.classList.toggle('active', k === target));
    document.body.classList.toggle('flex-active', target === 'flex');
  };
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.target;
      setActiveTab(target);
      try { localStorage.setItem(TAB_KEY, target); } catch (e) {}
    });
  });
  // refresh 시 마지막 선택된 탭 복원
  let savedTab = null;
  try { savedTab = localStorage.getItem(TAB_KEY); } catch (e) {}
  if (savedTab && frames[savedTab]) setActiveTab(savedTab);
  else {
    const initialActive = document.querySelector('.tab-btn.active');
    document.body.classList.toggle('flex-active', initialActive?.dataset.target === 'flex');
  }

  // flex 컨트롤 — iframe 으로 toggle 명령 post
  document.querySelectorAll('#flex-controls button').forEach(b => {
    b.addEventListener('click', () => {
      frames.flex.contentWindow.postMessage(
        { type: 'fx-toggle', target: b.dataset.fx }, '*'
      );
    });
  });
  // flex iframe 에서 state 수신 → 버튼 active 동기화
  // secondarySidebar / endPanel 은 옵션 (사용/미사용) — secondaryUsed / endUsed 기반
  window.addEventListener('message', (e) => {
    if (!e.data || e.data.type !== 'fx-state') return;
    const s = e.data;
    document.querySelectorAll('#flex-controls button').forEach(b => {
      const key = b.dataset.fx;
      const active =
        (key === 'startaside' && s.startAsideUsed) ||
        (key === 'header-lnb'   && s.headerMode === 'lnb') ||
        (key === 'header-start' && s.headerMode === 'start') ||
        (key === 'end'   && s.endUsed) ||
        (key === 'sheet' && s.sheetOpen);
      b.classList.toggle('active', !!active);
    });
    // startAside 가 off 면 하위 타입(사이드바/패널) 선택은 비활성
    document.getElementById('seg-startaside').classList.toggle('disabled', !s.startAsideUsed);
    // width/size 표시 업데이트 (flex 프레임에서 전달한 값 사용)
    try {
      const dims = document.getElementById('dims');
      if (dims) {
        const l = s.localEff ?? s.localWidth ?? null;
        const e2 = s.endEff ?? s.endWidth ?? null;
        const m = s.mainWidth ?? null;
        const parts = [];
        if (l != null) parts.push('L:' + l + 'px');
        if (e2 != null) parts.push('E:' + e2 + 'px');
        if (m != null) parts.push('M:' + m + 'px');
        if (parts.length) dims.textContent = parts.join(' · ');
      }
    } catch (err) {}
  });
</script>
</body>
</html>
